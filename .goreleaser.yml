version: 2

project_name: assern

snapshot:
  version_template: "nightly"

before:
    hooks:
        - go mod tidy
        - go mod verify

builds:
    -   id: assern
        binary: assern
        main: ./cmd/assern
        env:
            - CGO_ENABLED=0
        goos:
            - linux
            - darwin
        goarch:
            - amd64
            - arm64
        flags:
            - -trimpath
        ldflags:
            - -s -w
            - -X github.com/valksor/go-assern/internal/version.Version={{.Version}}
            - -X github.com/valksor/go-assern/internal/version.Commit={{.ShortCommit}}
            - -X github.com/valksor/go-assern/internal/version.BuildTime={{.Date}}

# Binary-only releases (no tarballs)
archives:
    -   id: binaries
        ids: [assern]
        formats: [binary]
        name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
    name_template: 'checksums.txt'
    algorithm: sha256

# Minisign signing (signs the checksum file only - matches release.yml wiring)
signs:
    -   id: minisign
        cmd: minisign
        signature: "${artifact}.minisig"
        stdin: "{{ .Env.MINISIGN_PASSWORD }}"
        args:
            - "-S"
            - "-m"
            - "${artifact}"
            - "-s"
            - "/tmp/minisign.key"
            - "-x"
            - "${signature}"
        artifacts: checksum

# SBOM generation
sboms:
    -   artifacts: binary
        documents:
            - "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}.sbom.spdx.json"

changelog:
    sort: asc

release:
    # Append changelog to existing release notes (keeps "Full Changelog" link and custom text)
    mode: append
